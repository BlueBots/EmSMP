<head>
  <title>Emerald SMP Server Info</title>
  <link rel="icon" href="https://server.emsmp.cf/21-2-minecraft-emerald-png.png">
</head>
<body>
<a id="back-btn" href="https://www.emsmp.cf/" onclick="handleBack(event)">
  <svg class="arrow-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
  </svg>
  <div class="spinner"></div>
  <span class="btn-label">Back to Website</span>
</a>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
<div class="card"> <div class="icon1"></div><div class="header">
  <div class="image"> <img src="https://server.emsmp.cf/unnamed.png?width=1116&height=860" alt="" /> </div> 
  <h2>Play.EmSMP.cf</h2>
  </div>
    <p id="sv">Server Offline</p>
<!--   <p id="rest">Loading ...</p> -->
</div>
<style>
  body,html{
  background:url(https://server.emsmp.cf/emsmp.png) center center / cover no-repeat fixed;
/*   background-size:cover; */
  min-height:100%;
  font-family: 'Roboto Mono',  monospace;
  font-size:15px;
  display:flex;
  align-items:center;
  justify-content:center
}
body:before{
  content:""; width:100%; height:110%; background:rgba(0,0,0,0.8);
  position:fixed;
  top:0;
  left:0;
  z-index:10
}
#back-btn {
  position: fixed;
  top: 16px; left: 16px;
  z-index: 9999;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: #1a1a1a;
  color: #4ade80;
  border: 1px solid rgba(74, 222, 128, 0.35);
  border-radius: 6px;
  font-family: 'Roboto Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  transition: background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
  white-space: nowrap;
}
#back-btn:hover {
  background: #222;
  border-color: rgba(74, 222, 128, 0.65);
  box-shadow: 0 4px 14px rgba(0,0,0,0.5);
}
#back-btn:active { transform: translateY(1px); }
#back-btn svg { flex-shrink: 0; transition: transform 180ms ease; }
#back-btn:hover svg { transform: translateX(-2px); }
#back-btn.loading { pointer-events: none; opacity: 0.75; }
.spinner {
  display: none;
  width: 14px; height: 14px;
  border: 2px solid rgba(74, 222, 128, 0.2);
  border-top-color: #4ade80;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
#back-btn.loading .spinner { display: block; }
#back-btn.loading .arrow-icon { display: none; }
#back-btn.loading .btn-label { color: #a0a0a0; }
h1,h2{
  font-weight:400;
  letter-spacing:-2px
}
  
    #sq{
   width: 20px;
    height:20px;
      padding-left:3px;
position:absolute;
      margin-top:6px;
  }
  
.card {
  position: relative;
  margin: 0 auto;
  padding: 0;
  width: clamp(300px, 85vw, 360px);
  background: #ffffff;
  border-radius: 5px;
  box-shadow: 0px 0px 16px 0px rgba(0, 0, 0, 0.3);
  -webkit-animation: fadein 2s;
          animation: fadein 2s;
  overflow:hidden;
  z-index: 999;
    transform: translatey(0px);
	animation: float 7s ease-in-out infinite;
}

.header {
  position: relative;
  z-index:1;
  width: 100%;
  height: clamp(140px, 40vw, 180px);
  box-shadow:0 4px 3px #0002;
  overflow: hidden;
}
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
  transition: all 1s ease;
  z-index:0
}
.image {
  width: 100%;
  height: 100%;
  cursor:crosshair;
  overflow:hidden;
  display: block;
  margin-left: auto;
  margin-right: auto;
}

.image:hover img{
  -webkit-transform: scale(1.2, 1.2);
          transform: scale(1.2, 1.2);
}

.header h2{
  position:absolute;
  bottom:0;
  margin:0;
  width:100%;
  padding:0 10px;
  color:#fff;
  text-transform:uppercase;
  pointer-events:none;
  background: linear-gradient(to bottom, rgba(0,0,0,0) 0%,rgba(0,0,0,0.65) 100%);
}
.icon {
  position: absolute;
  background:#fff;
  right: 10px;
  top: 135px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  overflow:hidden;
  border:3px solid #fff;
  box-shadow:0 4px 3px #0002;
  z-index:9
}
#rest{
  padding:0px 15px;
  line-height:30px;
  color:#000000
}
  #sv{
  padding:7px 15px;
  line-height:30px;
  color:#000000
}
@keyframes float {
	0% {

		transform: translatey(0px);
	}
	50% {
		transform: translatey(-20px);
	}
	100% {
		transform: translatey(0px);
	}
}

</style>
<script>
  //based on a pen by @robinselmer
var url = "https://api.minetools.eu/ping/mentallychallenged.serv.gs";
 
$.getJSON(url, function(r) {
    //data is the JSON string
   if(r.error){
    $('#rest').html('Server Offline');
   return false;
 } 
var pl = '';
  var pl2 = '';
var pl3 = '';
var pl4 = '';
var pl5 = '';

 if(r.players.sample.length > 0 ){ pl = '<br>Name: '+r.players.sample[0].name + `<img id="sq" src="https://minotar.net/helm/${r.players.sample[0].name}">`;  } 
 if(r.players.sample.length > 1 ){ pl2 = '<br>Name: '+r.players.sample[1].name + `<img id="sq" src="https://minotar.net/helm/${r.players.sample[1].name}">`;  }
  if(r.players.sample.length > 2 ){ pl3 = '<br>Name: '+r.players.sample[2].name + `<img id="sq" src="https://minotar.net/helm/${r.players.sample[2].name}">`;  } 
 if(r.players.sample.length > 3 ){ pl4 = '<br>Name: '+r.players.sample[3].name + `<img id="sq" src="https://minotar.net/helm/${r.players.sample[3].name}">`; } 
   if(r.players.sample.length > 4 ){ pl5 = '<br>Name: '+r.players.sample[4].name + `<img id="sq" src="https://minotar.net/helm/${r.players.sample[4].name}">`;  } 

          $('#sv').html('<b>Server MOTD:</b> '+r.description.replace(/§(.+?)/gi, '')+'<br><b>Server Version:</b> '+r.version.name+'<br><b>Players Online:</b> ' + r.players.online+pl+pl2+pl3+pl4+pl5);
setInterval(() => {
  var url1 = "https://api.minetools.eu/ping/mentallychallenged.serv.gs";

  $.getJSON(url1, function(b) {
  var al = '';
  var al2 = '';
var al3 = '';
var al4 = '';
var al5 = '';

 if(b.players.sample.length > 0 ){ al = '<br>Name: '+b.players.sample[0].name + `<img id="sq" src="https://minotar.net/helm/${b.players.sample[0].name}">`;  } 
 if(b.players.sample.length > 1 ){ al2 = '<br>Name: '+b.players.sample[1].name + `<img id="sq" src="https://minotar.net/helm/${b.players.sample[1].name}">`;  }
  if(b.players.sample.length > 2 ){ al3 = '<br>Name: '+b.players.sample[2].name + `<img id="sq" src="https://minotar.net/helm/${b.players.sample[2].name}">`;  } 
 if(b.players.sample.length > 3 ){ al4 = '<br>Name: '+b.players.sample[3].name + `<img id="sq" src="https://minotar.net/helm/${b.players.sample[3].name}">`;  } 
   if(b.players.sample.length > 4 ){ al5 = '<br>Name: '+b.players.sample[4].name + `<img id="sq" src="https://minotar.net/helm/${b.players.sample[4].name}">`;  } 

          $('#sv').html('<b>Server MOTD:</b> '+b.description.replace(/§(.+?)/gi, '')+'<br><b>Server Version:</b> '+b.version.name+'<br><b>Players Online:</b> ' + b.players.online+al+al2+al3+al4+al5);
  });
}, 10000);


 // $('#rest').html('<b>Players Online:</b> ' + r.players.online+pl+pl2+pl3+pl4+pl5);
 $('#favicon').attr('src', r.favicon);

});
function handleBack(e) {
  e.preventDefault();
  var btn = document.getElementById('back-btn');
  btn.classList.add('loading');
  btn.querySelector('.btn-label').textContent = 'Loading...';
  setTimeout(function() {
    window.location.href = 'https://www.emsmp.cf/';
  }, 50);
}
</script>
</body>
